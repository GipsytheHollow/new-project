<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | BUAC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-header">
            <img src="logoo.png" alt="BUAC Logo">
            <h2>Join the Club</h2>
            <p>Begin your journey with thrill-seekers.</p>
        </div>

        <form id="signupForm">
            <div class="input-group">
                <input type="text" id="memberId" placeholder="Member ID (e.g. 24101606)" required>
            </div>
            <div class="input-group">
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Student Email Address" required>
            </div>
            <div class="input-group">
                <input type="date" id="joinDate" placeholder="Join Date" required>
            </div>
            <div class="input-group">
                <input type="text" id="deptId" placeholder="Department ID (e.g. D01)" required>
            </div>
            <div class="input-group">
                <input type="text" id="posId" placeholder="Position ID (e.g. P01)" required>
            </div>
            <div class="input-group">
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Create Password" required>
            </div>
            <button type="submit" class="auth-submit">Sign Up</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const memberId = document.getElementById('memberId').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const joinDate = document.getElementById('joinDate').value;
            const deptId = document.getElementById('deptId').value;
            const posId = document.getElementById('posId').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.auth-submit');

            submitBtn.textContent = 'Creating account...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ memberId, name, email, joinDate, deptId, posId, phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Account created successfully! Please log in.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Signup failed');
                }
            } catch (error) {
                console.error("Server error:", error);
                alert("Could not connect to the server.");
            } finally {
                submitBtn.textContent = 'Sign Up';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
